<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/" class="brand-link">
        <span class="brand-text">WriteSpace</span>
      </a>
    </div>

    <button
      class="hamburger-btn"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen"
      aria-label="Toggle navigation menu"
    >
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <div class="navbar-links" [class.mobile-open]="isMobileMenuOpen">
      @if (isAuthenticated) {
        <a routerLink="/dashboard" routerLinkActive="active-link" class="nav-link" (click)="closeMobileMenu()">
          Dashboard
        </a>
      } @else {
        <a routerLink="/login" routerLinkActive="active-link" class="nav-link" (click)="closeMobileMenu()">
          Login
        </a>
        <a routerLink="/register" routerLinkActive="active-link" class="nav-link nav-link-register" (click)="closeMobileMenu()">
          Register
        </a>
      }
    </div>
  </div>
</nav>
